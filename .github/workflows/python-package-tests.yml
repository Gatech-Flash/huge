name: python-package-tests

on:
  push:
    paths:
      - "python-package/**"
      - ".github/workflows/python-package-tests.yml"
  pull_request:
    paths:
      - "python-package/**"
      - ".github/workflows/python-package-tests.yml"
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./python-package[test,viz,runtime]"
      - name: Run unit tests
        run: |
          cd python-package
          pytest tests/test_public_api.py tests/test_core_unit.py tests/test_runtime_errors.py tests/test_native_smoke.py

  e2e-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install e2e deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./python-package[test,viz,runtime]"
      - name: Run e2e + Rd parity tests
        run: |
          cd python-package
          pytest -q tests/test_e2e_optional.py tests/test_rd_examples_parity.py -rA

  parity-r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: r-lib/actions/setup-r@v2
      - name: Install R package dependencies
        env:
          R_LIBS_USER: ${{ github.workspace }}/.Rlib
        run: |
          mkdir -p "${R_LIBS_USER}"
          R -q -e 'install.packages(c("Rcpp", "RcppEigen", "igraph"), repos="https://cloud.r-project.org")'
      - name: Install local huge package into isolated R library
        env:
          R_LIBS_USER: ${{ github.workspace }}/.Rlib
        run: |
          mkdir -p "${R_LIBS_USER}"
          R CMD INSTALL "${GITHUB_WORKSPACE}"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./python-package[test,viz,runtime]"
      - name: Run native-vs-R parity tests
        env:
          R_LIBS_USER: ${{ github.workspace }}/.Rlib
        run: |
          cd python-package
          pytest -q tests/test_native_vs_r_parity.py -rA
