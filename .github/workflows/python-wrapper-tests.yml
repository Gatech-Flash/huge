name: python-wrapper-tests

on:
  push:
    paths:
      - "python-package/**"
      - ".github/workflows/python-wrapper-tests.yml"
  pull_request:
    paths:
      - "python-package/**"
      - ".github/workflows/python-wrapper-tests.yml"

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy scipy
      - name: Run tests
        run: |
          cd python-package
          pytest tests/test_core_unit.py tests/test_runtime_errors.py

  e2e-r-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: r-lib/actions/setup-r@v2
      - name: Install R deps (system packages)
        run: |
          sudo apt-get update
          sudo apt-get install -y r-cran-igraph r-cran-rcpp r-cran-rcppeigen
      - name: Install local huge package into isolated R library
        env:
          R_LIBS_USER: ${{ github.workspace }}/.Rlib
        run: |
          mkdir -p "${R_LIBS_USER}"
          R CMD INSTALL "${GITHUB_WORKSPACE}"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy scipy rpy2 matplotlib networkx
      - name: Run optional e2e tests (must execute, not skip)
        env:
          R_LIBS_USER: ${{ github.workspace }}/.Rlib
          PYTHONPATH: ${{ github.workspace }}/python-package
        run: |
          cd python-package
          out="$(pytest -q tests/test_e2e_optional.py -rA)"
          echo "$out"
          passed_count="$(printf '%s\n' "$out" | awk '/^PASSED tests\/test_e2e_optional.py::/{n++} END{print n+0}')"
          test "$passed_count" -eq 6
