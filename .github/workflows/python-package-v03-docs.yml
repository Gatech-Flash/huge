name: python-package-v03-docs

on:
  push:
    branches:
      - master
    paths:
      - "python-package-v0.3/**"
      - ".github/workflows/python-package-v03-docs.yml"
  pull_request:
    paths:
      - "python-package-v0.3/**"
      - ".github/workflows/python-package-v03-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "python-package-v03-docs"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "./python-package-v0.3[docs]"
      - name: Build docs
        run: |
          cd python-package-v0.3
          mkdocs build --strict --site-dir ../site-v03
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-v03

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
